name: Planner Agent Trigger

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to run the Planner Agent on'
        required: true
        type: string

concurrency:
  group: planner-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  plan:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'agent:planner')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve issue details
        id: issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            NUM="${{ inputs.issue_number }}"
            TITLE=$(gh issue view "$NUM" --repo "$REPO" --json title -q .title)
            {
              echo 'body<<ISSUE_EOF'
              gh issue view "$NUM" --repo "$REPO" --json body -q .body
              echo 'ISSUE_EOF'
            } >> "$GITHUB_OUTPUT"
          else
            NUM="${{ github.event.issue.number }}"
            TITLE="${{ github.event.issue.title }}"
            {
              echo 'body<<ISSUE_EOF'
              echo "${{ github.event.issue.body }}"
              echo 'ISSUE_EOF'
            } >> "$GITHUB_OUTPUT"
          fi
          echo "number=$NUM" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Run Planner Agent via Claude Code CLI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          REPO: ${{ github.repository }}
        run: |
          SYSTEM_PROMPT=$(cat .github/agents/planner-agent.md)

          PROMPT="You are the Planner Agent. Here is the issue to process:

          Title: ${ISSUE_TITLE}
          Body:
          ${ISSUE_BODY}

          Repository: ${REPO}
          Parent issue number: ${ISSUE_NUMBER}

          Instructions:
          1. Extract the topic name, requirements, and tech stack from the issue body.
          2. Create 9 child issues (one per deliverable listed in your persona) using the gh CLI.
             Each issue must:
             - Have a title following the pattern: [{topic_name}] {Deliverable Name}
             - Include the topic name, requirements, and tech stack in the body
             - Reference the parent issue #${ISSUE_NUMBER}
             - Carry the label 'agent:spec-edge-test' (NOT 'agent:developer') so the Spec Edge Case Tester runs before any development begins
          3. After creating all issues, post a comment on issue #${ISSUE_NUMBER} listing every child issue with its number and link.

          Use these gh CLI commands:
          - gh issue create --repo ${REPO} --title '...' --body '...'
          - gh issue comment ${ISSUE_NUMBER} --repo ${REPO} --body '...'
          "

          claude -p --dangerously-skip-permissions --system-prompt "$SYSTEM_PROMPT" "$PROMPT"
